<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangram</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      color: #111;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: normal;
      text-transform: uppercase;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
    }

    .subtitle {
      color: #888;
      font-size: 13px;
      letter-spacing: 0.15em;
      margin-top: 6px;
    }

    .layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .canvas-wrap {
      background: #f7f7f7;
      border-radius: 4px;
      border: 1px solid #ddd;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: min(460px, 68vw);
      flex-shrink: 0;
    }

    #board {
      display: block;
      width: 100%;
      touch-action: none;
      cursor: default;
    }

    .controls {
      width: 140px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .selected-box {
      border-radius: 6px;
      padding: 10px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .selected-label {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #cc0000;
    }

    .selected-empty {
      color: #bbb;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .group-title {
      margin: 0;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider {
      border-top: 1px solid #eee;
      margin: 2px 0;
    }

    .footer {
      color: #ccc;
      font-size: 10px;
      margin-top: 8px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    button {
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
      width: 100%;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tangram</h1>
    <p class="subtitle">Drag pieces · Click to select · Use panel to rotate &amp; flip</p>
  </div>

  <div class="layout">
    <div class="canvas-wrap">
      <svg id="board" viewBox="0 0 500 600" aria-label="Tangram board"></svg>
    </div>

    <div class="controls">
      <div id="selected-box" class="selected-box"></div>

      <div class="group">
        <p class="group-title">Rotate</p>
        <button id="rotate-left">↺ −45°</button>
        <button id="rotate-right">↻ +45°</button>
      </div>

      <div class="group">
        <p class="group-title">Flip</p>
        <button id="flip">⇄ Flip</button>
      </div>

      <div class="divider"></div>

      <button id="reset">↩ Reset</button>

      <p class="footer">All 7 pieces</p>
    </div>
  </div>

  <script>
    const PIECES = [
      { id: "large-tri-1", label: "Large Triangle 1", points: "0,0 200,0 100,100", color: "#FF0000", x: 30, y: 30, rotation: 0 },
      { id: "large-tri-2", label: "Large Triangle 2", points: "0,0 200,0 100,100", color: "#FF0000", x: 270, y: 30, rotation: 180 },
      { id: "med-tri", label: "Medium Triangle", points: "0,0 141,0 70,71", color: "#FF0000", x: 50, y: 180, rotation: 0 },
      { id: "small-tri-1", label: "Small Triangle 1", points: "0,0 100,0 50,50", color: "#FF0000", x: 220, y: 180, rotation: 0 },
      { id: "small-tri-2", label: "Small Triangle 2", points: "0,0 100,0 50,50", color: "#FF0000", x: 350, y: 180, rotation: 90 },
      { id: "square", label: "Square", points: "0,0 100,0 100,100 0,100", color: "#FF0000", x: 100, y: 320, rotation: 45 },
      { id: "parallelogram", label: "Parallelogram", points: "50,0 150,0 100,100 0,100", color: "#FF0000", x: 280, y: 300, rotation: 0 }
    ];

    const state = {
      pieces: PIECES.map(p => ({ ...p })),
      selected: null,
      dragging: null,
      dragOffset: { x: 0, y: 0 }
    };

    const svg = document.getElementById("board");
    const selectedBox = document.getElementById("selected-box");
    const rotateLeftBtn = document.getElementById("rotate-left");
    const rotateRightBtn = document.getElementById("rotate-right");
    const flipBtn = document.getElementById("flip");
    const resetBtn = document.getElementById("reset");

    function getBoundingBox(points) {
      const pts = points.trim().split(" ").map(p => {
        const [x, y] = p.split(",").map(Number);
        return { x, y };
      });
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys),
        cx: (Math.min(...xs) + Math.max(...xs)) / 2,
        cy: (Math.min(...ys) + Math.max(...ys)) / 2
      };
    }

    function getSVGPoint(clientX, clientY) {
      const rect = svg.getBoundingClientRect();
      const scaleX = 500 / rect.width;
      const scaleY = 600 / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function sideBtnStyle(btn, disabled, isReset = false) {
      btn.disabled = disabled;
      btn.style.background = disabled ? "#f5f5f5" : isReset ? "#fff5f5" : "#fff";
      btn.style.border = `1px solid ${disabled ? "#e8e8e8" : isReset ? "#ffcccc" : "#ffaaaa"}`;
      btn.style.color = disabled ? "#ccc" : isReset ? "#cc4444" : "#cc0000";
      btn.style.cursor = disabled ? "default" : "pointer";
    }

    function updateControls() {
      const selectedPiece = state.pieces.find(p => p.id === state.selected);

      if (selectedPiece) {
        selectedBox.style.background = "#fff0f0";
        selectedBox.style.border = "1px solid #ffaaaa";
        selectedBox.innerHTML = `<span class="selected-label">${selectedPiece.label}</span>`;
      } else {
        selectedBox.style.background = "#f5f5f5";
        selectedBox.style.border = "1px solid #e0e0e0";
        selectedBox.innerHTML = '<span class="selected-empty">Click a piece to select</span>';
      }

      const noSelection = !selectedPiece;
      sideBtnStyle(rotateLeftBtn, noSelection);
      sideBtnStyle(rotateRightBtn, noSelection);
      sideBtnStyle(flipBtn, noSelection);
      sideBtnStyle(resetBtn, false, true);
    }

    function render() {
      let grid = "";
      for (let xi = 0; xi < 11; xi += 1) {
        for (let yi = 0; yi < 13; yi += 1) {
          grid += `<circle cx="${xi * 50}" cy="${yi * 50}" r="1.5" fill="#ddd"></circle>`;
        }
      }

      const piecesMarkup = state.pieces.map(piece => {
        const bb = getBoundingBox(piece.points);
        const flipTransform = piece.flipped ? ` scale(-1,1) translate(${-(bb.minX + bb.maxX)},0)` : "";
        const transform = `translate(${piece.x},${piece.y}) rotate(${piece.rotation},${bb.cx},${bb.cy})${flipTransform}`;
        const isSelected = state.selected === piece.id;

        return `
          <g
            data-piece-id="${piece.id}"
            transform="${transform}"
            style="cursor:${state.dragging === piece.id ? "grabbing" : "grab"}"
          >
            <polygon
              points="${piece.points}"
              fill="${piece.color}"
              opacity="${isSelected ? 1 : 0.82}"
              stroke="${isSelected ? "#ffffff" : "rgba(0,0,0,0.15)"}"
              stroke-width="${isSelected ? 2.5 : 1}"
              stroke-linejoin="round"
              style="filter:${isSelected ? "drop-shadow(0 0 8px rgba(255,0,0,0.5))" : "none"};transition:opacity 0.15s"
            ></polygon>
            <polygon points="${piece.points}" fill="url(#shine)" opacity="0.1" style="pointer-events:none"></polygon>
          </g>
        `;
      }).join("");

      svg.style.cursor = state.dragging ? "grabbing" : "default";
      svg.innerHTML = `
        ${grid}
        ${piecesMarkup}
        <defs>
          <linearGradient id="shine" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
          </linearGradient>
        </defs>
      `;

      updateControls();
    }

    function bringToFront(id) {
      const idx = state.pieces.findIndex(p => p.id === id);
      if (idx < 0) return;
      const item = state.pieces.splice(idx, 1)[0];
      state.pieces.push(item);
    }

    function startDrag(id, clientX, clientY) {
      const piece = state.pieces.find(p => p.id === id);
      if (!piece) return;
      const pt = getSVGPoint(clientX, clientY);
      state.dragOffset = { x: pt.x - piece.x, y: pt.y - piece.y };
      state.dragging = id;
      state.selected = id;
      bringToFront(id);
      render();
    }

    function onPointerMove(clientX, clientY) {
      if (!state.dragging) return;
      const pt = getSVGPoint(clientX, clientY);
      state.pieces = state.pieces.map(p =>
        p.id === state.dragging
          ? { ...p, x: pt.x - state.dragOffset.x, y: pt.y - state.dragOffset.y }
          : p
      );
      render();
    }

    function stopDrag() {
      state.dragging = null;
      render();
    }

    function rotateSelected(delta) {
      if (!state.selected) return;
      state.pieces = state.pieces.map(p =>
        p.id === state.selected
          ? { ...p, rotation: (p.rotation + delta + 360) % 360 }
          : p
      );
      render();
    }

    function flipSelected() {
      if (!state.selected) return;
      state.pieces = state.pieces.map(p =>
        p.id === state.selected ? { ...p, flipped: !p.flipped } : p
      );
      render();
    }

    function resetAll() {
      state.pieces = PIECES.map(p => ({ ...p }));
      state.selected = null;
      state.dragging = null;
      render();
    }

    svg.addEventListener("mousedown", (e) => {
      const group = e.target.closest("[data-piece-id]");
      if (!group) {
        state.selected = null;
        render();
        return;
      }
      e.preventDefault();
      const id = group.getAttribute("data-piece-id");
      startDrag(id, e.clientX, e.clientY);
    });

    svg.addEventListener("touchstart", (e) => {
      const group = e.target.closest("[data-piece-id]");
      if (!group) return;
      e.preventDefault();
      const touch = e.touches[0];
      const id = group.getAttribute("data-piece-id");
      startDrag(id, touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener("mousemove", (e) => onPointerMove(e.clientX, e.clientY));
    window.addEventListener("mouseup", stopDrag);

    window.addEventListener("touchmove", (e) => {
      if (!state.dragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      onPointerMove(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener("touchend", stopDrag);

    rotateLeftBtn.addEventListener("click", () => rotateSelected(-45));
    rotateRightBtn.addEventListener("click", () => rotateSelected(45));
    flipBtn.addEventListener("click", flipSelected);
    resetBtn.addEventListener("click", resetAll);

    render();
  </script>
</body>
</html>
